version: "3.7"
services:
## ========================== TALKHUB CRM (Django-CRM / TalkHub CRM) ========================== ##

  ## ---- PostgreSQL 16 (com RLS para multi-tenancy) ---- ##
  crm_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${CRM_POSTGRES_PASSWORD:?CRM_POSTGRES_PASSWORD must be set}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - TZ=America/Sao_Paulo
    command: >
      postgres
      -c crm.db_password=${CRM_DB_PASSWORD}
    volumes:
      - crm_db:/var/lib/postgresql/data
    configs:
      - source: init_rls_user
        target: /docker-entrypoint-initdb.d/init-rls-user.sql
    networks:
      - talkhub
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M

  ## ---- Django Backend (Gunicorn) ---- ##
  crm_backend:
    image: talkhub/djangocrm-backend:latest
    entrypoint: /entrypoint-prod.sh
    environment:
      ## Django
      - SECRET_KEY=${CRM_SECRET_KEY:?CRM_SECRET_KEY must be set}
      - ENV_TYPE=prod
      - DEBUG=False
      - ALLOWED_HOSTS=crm.talkhub.me,localhost
      - DOMAIN_NAME=https://crm.talkhub.me
      - FRONTEND_URL=https://crm.talkhub.me
      - SWAGGER_ROOT_URL=https://crm.talkhub.me
      - TIME_ZONE=America/Sao_Paulo
      ## Database (MUST be non-superuser for RLS)
      - DBNAME=crm_db
      - DBUSER=crm_user
      - DBPASSWORD=${CRM_DB_PASSWORD:?CRM_DB_PASSWORD must be set}
      - DBHOST=crm_db
      - DBPORT=5432
      ## Redis (shared service)
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      ## MinIO S3
      - AWS_BUCKET_NAME=${CRM_S3_BUCKET:-talkhub-crm}
      - AWS_ACCESS_KEY_ID=${CRM_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${CRM_S3_SECRET_KEY}
      - AWS_S3_ENDPOINT_URL=${CRM_S3_ENDPOINT:-https://bucketss3.talkhub.me}
      ## SMTP (Titan)
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=smtp.titan.email
      - EMAIL_PORT=465
      - EMAIL_USE_SSL=True
      - EMAIL_HOST_USER=adm@talkhub.me
      - EMAIL_HOST_PASSWORD=${CRM_SMTP_PASSWORD:?CRM_SMTP_PASSWORD must be set}
      - DEFAULT_FROM_EMAIL=TalkHub CRM <adm@talkhub.me>
      - ADMIN_EMAIL=admin@talkhub.me
      - ADMIN_PASSWORD=${CRM_ADMIN_PASSWORD:?CRM_ADMIN_PASSWORD must be set}
      ## CORS / CSRF
      - CORS_ALLOWED_ORIGINS=https://crm.talkhub.me
      - CORS_ALLOW_ALL=False
      - CSRF_TRUSTED_ORIGINS=https://crm.talkhub.me
      ## Sentry (opcional)
      - SENTRY_DSN=${CRM_SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${CRM_SENTRY_ENVIRONMENT:-prod}
      ## Google OAuth
      - GOOGLE_CLIENT_ID=${CRM_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${CRM_GOOGLE_CLIENT_SECRET}
      ## Fernet encryption
      - FERNET_KEY=${CRM_FERNET_KEY}
    volumes:
      - crm_static:/app/staticfiles
      - crm_media:/app/media
    networks:
      - talkhub
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        ## Rota API/Admin/Static (prioridade alta)
        - traefik.http.routers.crm_api.rule=Host(`crm.talkhub.me`) && (PathPrefix(`/api`) || PathPrefix(`/admin/`) || PathPrefix(`/static`) || PathPrefix(`/swagger`) || PathPrefix(`/media`) || PathPrefix(`/invite/`) || PathPrefix(`/webhooks/`) || PathPrefix(`/track/`))
        - traefik.http.routers.crm_api.entrypoints=websecure
        - traefik.http.routers.crm_api.tls=true
        - traefik.http.routers.crm_api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.crm_api.priority=20
        - traefik.http.services.crm_api.loadbalancer.server.port=8000
        ## Headers HTTPS
        - traefik.http.middlewares.crm_headers.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.middlewares.crm_headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.crm_headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.crm_headers.headers.stsPreload=true
        - traefik.http.middlewares.crm_headers.headers.frameDeny=true
        - traefik.http.middlewares.crm_headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.crm_headers.headers.browserXssFilter=true
        - traefik.http.middlewares.crm_headers.headers.referrerPolicy=strict-origin-when-cross-origin
        ## Rate limiting
        - traefik.http.middlewares.crm_ratelimit.ratelimit.average=100
        - traefik.http.middlewares.crm_ratelimit.ratelimit.burst=50
        - traefik.http.middlewares.crm_ratelimit.ratelimit.period=1s
        - traefik.http.routers.crm_api.middlewares=crm_headers,crm_ratelimit

  ## ---- Celery Worker ---- ##
  crm_worker:
    image: talkhub/djangocrm-backend:latest
    entrypoint: /entrypoint-prod.sh
    environment:
      - SERVICE_ROLE=worker
      - SECRET_KEY=${CRM_SECRET_KEY:?CRM_SECRET_KEY must be set}
      - ENV_TYPE=prod
      - DEBUG=False
      - DBNAME=crm_db
      - DBUSER=crm_user
      - DBPASSWORD=${CRM_DB_PASSWORD:?CRM_DB_PASSWORD must be set}
      - DBHOST=crm_db
      - DBPORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AWS_BUCKET_NAME=${CRM_S3_BUCKET:-talkhub-crm}
      - AWS_ACCESS_KEY_ID=${CRM_S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${CRM_S3_SECRET_KEY}
      - AWS_S3_ENDPOINT_URL=${CRM_S3_ENDPOINT:-https://bucketss3.talkhub.me}
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=smtp.titan.email
      - EMAIL_PORT=465
      - EMAIL_USE_SSL=True
      - EMAIL_HOST_USER=adm@talkhub.me
      - EMAIL_HOST_PASSWORD=${CRM_SMTP_PASSWORD:?CRM_SMTP_PASSWORD must be set}
      - DEFAULT_FROM_EMAIL=TalkHub CRM <adm@talkhub.me>
      - DOMAIN_NAME=https://crm.talkhub.me
      - FRONTEND_URL=https://crm.talkhub.me
      - SENTRY_DSN=${CRM_SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${CRM_SENTRY_ENVIRONMENT:-prod}
      ## Google OAuth
      - GOOGLE_CLIENT_ID=${CRM_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${CRM_GOOGLE_CLIENT_SECRET}
      ## Fernet encryption
      - FERNET_KEY=${CRM_FERNET_KEY}
    volumes:
      - crm_media:/app/media
    networks:
      - talkhub
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  ## ---- Celery Beat (scheduler) ---- ##
  crm_beat:
    image: talkhub/djangocrm-backend:latest
    entrypoint: /entrypoint-prod.sh
    environment:
      - SERVICE_ROLE=beat
      - SECRET_KEY=${CRM_SECRET_KEY:?CRM_SECRET_KEY must be set}
      - ENV_TYPE=prod
      - DEBUG=False
      - DBNAME=crm_db
      - DBUSER=crm_user
      - DBPASSWORD=${CRM_DB_PASSWORD:?CRM_DB_PASSWORD must be set}
      - DBHOST=crm_db
      - DBPORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SENTRY_DSN=${CRM_SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${CRM_SENTRY_ENVIRONMENT:-prod}
    networks:
      - talkhub
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  ## ---- SvelteKit Frontend ---- ##
  crm_frontend:
    image: talkhub/djangocrm-frontend:latest
    environment:
      - PUBLIC_DJANGO_API_URL=https://crm.talkhub.me
      - PUBLIC_SENTRY_DSN=${CRM_SENTRY_DSN:-}
      - NODE_ENV=production
      - ORIGIN=https://crm.talkhub.me
      ## Google OAuth
      - GOOGLE_CLIENT_ID=${CRM_GOOGLE_CLIENT_ID}
      - GOOGLE_LOGIN_DOMAIN=https://crm.talkhub.me
    networks:
      - talkhub
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        ## Frontend catch-all (prioridade baixa — API tem prioridade)
        - traefik.http.routers.crm_frontend.rule=Host(`crm.talkhub.me`)
        - traefik.http.routers.crm_frontend.entrypoints=websecure
        - traefik.http.routers.crm_frontend.tls=true
        - traefik.http.routers.crm_frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.crm_frontend.priority=10
        - traefik.http.services.crm_frontend.loadbalancer.server.port=3000
        - traefik.http.routers.crm_frontend.middlewares=crm_headers

## ========================== VOLUMES ========================== ##
volumes:
  crm_db:
    external: true
    name: crm_db
  crm_static:
    external: true
    name: crm_static
  crm_media:
    external: true
    name: crm_media
## ========================== REDE ========================== ##
networks:
  talkhub:
    external: true
    name: talkhub

## ========================== CONFIGS ========================== ##
configs:
  init_rls_user:
    file: ./init-rls-user.sql
